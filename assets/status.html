<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ThingBlock Link</title>
<style>
  /* Brand surface: bright app reads best on a light background (brand/DESIGN.md). */
  :root {
    --orange: #ff7b35;
    --lime: #84cc16;
    --error: #ff661a;
    --ink: #1a2e05;
    --muted: #5b6b4a;
    --line: #e6ebdf;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: #ffffff;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-user-select: none;
    user-select: none;
  }
  header { display: flex; align-items: center; gap: 10px; }
  header .glyph svg { width: 30px; height: 30px; display: block; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: 0.2px; }

  .rows { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 9px; font-size: 14px; }
  .row .label { color: var(--muted); min-width: 78px; }
  .row .value { font-weight: 600; }

  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
  .dot.ok { background: var(--lime); }
  .dot.warn { background: var(--orange); }
  .dot.err { background: var(--error); }

  footer { margin-top: auto; display: flex; justify-content: flex-end; }
  button {
    font: inherit;
    font-weight: 600;
    color: #fff;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.05); }
  button:active { filter: brightness(0.95); }
</style>
</head>
<body>
  <header>
    <span class="glyph">__GLYPH_SVG__</span>
    <h1>ThingBlock Link</h1>
  </header>

  <div class="rows">
    <div class="row">
      <span id="status-dot" class="dot"></span>
      <span class="label">Helper</span>
      <span id="status-value" class="value">…</span>
    </div>
    <div class="row">
      <span id="health-dot" class="dot"></span>
      <span class="label">arduino-cli</span>
      <span id="health-value" class="value">…</span>
    </div>
    <div class="row">
      <span class="dot" style="visibility:hidden"></span>
      <span class="label">Boards</span>
      <span id="boards-value" class="value">…</span>
    </div>
  </div>

  <footer>
    <button id="quit">Quit</button>
  </footer>

  <script>
    // Repaint the helper status row. `s` = {state, port, message}.
    function __status(s) {
      const dot = document.getElementById("status-dot");
      const value = document.getElementById("status-value");
      dot.className = "dot";
      if (s.state === "running") {
        dot.classList.add("ok");
        value.textContent = "Running on :" + s.port;
      } else if (s.state === "failed") {
        dot.classList.add("err");
        value.textContent = "Failed" + (s.message ? " — " + s.message : "");
      } else {
        dot.classList.add("warn");
        value.textContent = "Starting…";
      }
    }

    // Repaint the daemon-health + board-count rows. `t` = {boards, healthy}.
    function __telemetry(t) {
      const dot = document.getElementById("health-dot");
      const value = document.getElementById("health-value");
      dot.className = "dot " + (t.healthy ? "ok" : "err");
      value.textContent = t.healthy ? "Healthy" : "Unreachable";

      const boards = document.getElementById("boards-value");
      boards.textContent =
        t.boards === 1 ? "1 connected" : t.boards + " connected";
    }

    document.getElementById("quit").addEventListener("click", () => {
      window.ipc.postMessage("quit");
    });

    // Paint the state captured when the window was opened; live updates arrive
    // via __status / __telemetry called from the host.
    __status(__INIT_STATUS__);
    __telemetry(__INIT_TELEMETRY__);
  </script>
</body>
</html>
